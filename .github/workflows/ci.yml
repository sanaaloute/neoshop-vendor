name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm install --no-audit
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test:run
      - run: npm run typecheck
      - run: npm run build
